name: ChatManager
version: ${project.version}
main: jp.yama2211.chatManager.Main
api-version: '1.21'
authors: [ yamagami2211 ]
website: https://yama2211.jp/
commands:
  channel:
    description: チャンネル管理コマンド
    usage: /channel <サブコマンド>
    aliases: [ch]
  global:
    description: 全体チャットにメッセージを送信します
    usage: /global [メッセージ]
    aliases: [g]
permissions:
  channel.create:
    default: op
  channel.join:
    default: not op
  channel.invite:
    default: op
  channel.players:
    default: not op
  channel.leave:
    default: not op
  channel.delete:
    default: op
  channel.list:
    default: not op
